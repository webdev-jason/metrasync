<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<link rel="stylesheet" href="pages/revauditor.css" />

<div class="revauditor-wrapper">
    <header class="app-header">
        <div class="header-left">
            <button id="currentProfileBtn" class="profile-btn" title="Click to manage profiles">Profile: Kinnex</button>
        </div>
        <h1>Revision Auditor</h1>
        <div class="header-right">
            <button id="importLegacyBtn"><i class="fa-solid fa-file-excel"></i> Import Legacy</button>
            <button id="printBtn"><i class="fa-solid fa-file-pdf"></i> Save Report</button>
        </div>
    </header>

    <main class="app-main view-expanded">
        <section class="panel panel-center" style="display:flex; flex-direction: column;">
            <div class="viewer-header">
                <div class="viewer-toolbar" style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex: 1; display:flex; align-items:center; gap:10px;">
                        <button id="startAuditBtn" class="primary"><i class="fa-solid fa-play"></i> Start Audit</button>
                        <button id="abortAuditBtn" class="danger" disabled><i class="fa-solid fa-stop"></i> Abort</button>
                        <span id="auditStatusLabel" class="muted">Ready to scan.</span>
                    </div>
                    <div style="flex: 1; padding: 0 20px;">
                        <div class="progress-container"><div id="auditProgressBar" class="progress-bar"></div></div>
                    </div>
                    <div style="flex: 1; display:flex; justify-content:flex-end;">
                        <button id="addDocBtn"><i class="fa-solid fa-plus"></i> Add Document</button>
                    </div>
                </div>
            </div>

            <div class="tables-container" id="printableArea">
                <div class="table-group">
                    <h3>Left Column</h3>
                    <table class="audit-table" id="leftTable">
                        <thead>
                            <tr><th>Doc ID</th><th>Rev</th><th>Date</th><th>Prev Rev</th><th>Prev Date</th><th class="no-print">Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="table-group">
                    <h3>Right Column</h3>
                    <table class="audit-table" id="rightTable">
                        <thead>
                            <tr><th>Doc ID</th><th>Rev</th><th>Date</th><th>Prev Rev</th><th>Prev Date</th><th class="no-print">Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="docEditModal" class="modal" aria-hidden="true" style="z-index: 100;">
        <div class="modal-dialog" style="width: 500px; max-width: 90vw;">
            <div class="modal-header">
                <div id="docEditTitle">Edit Document</div>
                <button id="docEditCloseBtn">✕</button>
            </div>
            <div class="modal-body" style="gap: 10px;">
                <input type="hidden" id="editDocIdHidden" />
                <label class="field"><span>Group</span>
                    <select id="editDocGroup" class="form-input">
                        <option value="Left Column">Left Column</option>
                        <option value="Right Column">Right Column</option>
                    </select>
                </label>
                <label class="field"><span>Document ID (e.g. WI-03-011)</span><input id="editDocName" type="text" class="form-input" /></label>
                <label class="field"><span>Laserfiche URL</span><input id="editDocUrl" type="text" class="form-input" /></label>
                
                <div style="display:flex; gap:10px;">
                    <label class="field" style="flex:1;"><span>Current Rev</span><input id="editDocRev" type="text" class="form-input" /></label>
                    <label class="field" style="flex:1;"><span>Effective Date</span><input id="editDocDate" type="text" class="form-input" /></label>
                </div>
                <div style="display:flex; gap:10px;">
                    <label class="field" style="flex:1;"><span>Prev Rev</span><input id="editDocPrevRev" type="text" class="form-input" /></label>
                    <label class="field" style="flex:1;"><span>Prev Date</span><input id="editDocPrevDate" type="text" class="form-input" /></label>
                </div>
            </div>
            <div class="modal-footer" style="justify-content: space-between;">
                <button id="deleteDocBtn" class="danger">Delete</button>
                <button id="saveDocBtn" class="primary">Save Document</button>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal" aria-hidden="true" role="dialog" aria-label="Manage Profiles">
        <div class="modal-dialog" style="width: min(90vw, 500px)">
          <div class="modal-header">
            <div>Manage Auditor Profiles</div>
            <button id="profileCloseBtn" aria-label="Close">✕</button>
          </div>
          <div class="modal-body">
            <div class="field">
              <span>AVAILABLE PROFILES</span>
              <div id="profileList" class="profile-list"></div>
            </div>
            <div class="field" style="margin-top: 12px;">
              <span>CREATE NEW PROFILE</span>
              <div class="field-row">
                <input id="newProfileInput" type="text" class="form-input" placeholder="Enter new profile name..." />
                <button id="createProfileBtn" class="primary">Create</button>
              </div>
            </div>
          </div>
        </div>
    </div>

    <div id="auditAlertModal" class="modal" aria-hidden="true" style="z-index: 200;">
        <div class="modal-dialog" style="width: 400px; max-width: 90vw;">
            <div class="modal-header">
                <div id="auditAlertTitle">Alert</div>
                <button id="auditAlertCloseBtn">✕</button>
            </div>
            <div class="modal-body"><p id="auditAlertMessage" style="white-space: pre-wrap; line-height: 1.4;"></p></div>
            <div class="modal-footer"><button id="auditAlertOkBtn" class="primary" style="margin-left: auto;">OK</button></div>
        </div>
    </div>

    <div id="auditConfirmModal" class="modal" aria-hidden="true" style="z-index: 200;">
        <div class="modal-dialog" style="width: 400px; max-width: 90vw;">
          <div class="modal-header"><div id="auditConfirmTitle">Confirm</div></div>
          <div class="modal-body"><p id="auditConfirmMessage" style="white-space: pre-wrap;"></p></div>
          <div class="modal-footer">
            <button id="auditConfirmCancelBtn">Cancel</button>
            <button id="auditConfirmOkBtn" class="danger">OK</button>
          </div>
        </div>
    </div>
</div>
