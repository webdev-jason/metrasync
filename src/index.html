<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
    <title>MetraSync Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="top-header">
            <h1>MetraSync Dashboard</h1>
            <p>Welcome to the centralized lab application hub. Select a tool below to begin.</p>
        </header>

        <nav class="top-nav">
            <ul class="nav-links">
                <li class="theme-toggle-container">
                    <div id="themeToggleWrapper" class="theme-toggle-wrapper" title="Switch Theme">
                        <button id="globalThemeLightBtn" class="theme-btn" aria-label="Light Mode">
                            <i class="fa-solid fa-sun"></i>
                        </button>
                        <button id="globalThemeDarkBtn" class="theme-btn active" aria-label="Dark Mode">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </div>
                </li>
                
                <li><button class="nav-btn active" data-target="home.html">Home</button></li>
                <li><button class="nav-btn" data-target="notevault.html">Note Vault</button></li>
                <li><button class="nav-btn" data-target="revauditor.html">Revision Auditor</button></li>
                <li><button class="nav-btn" data-target="sra.html">Surface Roughness</button></li>
                <li><button class="nav-btn" data-target="vbarepo.html">VBA Repository</button></li>
            </ul>
        </nav>

        <main class="content-area">
            <div id="app-view">
                </div>
        </main>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
